{% extends "base.html" %}
{% block title %}Chat{% endblock %}
{% block content %}
<div class="flex flex-col h-[calc(100vh-3rem)]">
  <h2 class="text-xl font-semibold text-white mb-4">Chat</h2>

  <!-- Messages area -->
  <div id="chat-messages" class="flex-1 overflow-y-auto space-y-4 mb-4 p-4 bg-[#1a1d27] rounded-xl border border-[#2e3346]">
    <!-- Welcome message -->
    <div class="flex justify-start">
      <div class="bg-[#232736] rounded-xl px-4 py-3 max-w-[80%] border border-[#2e3346]">
        <p class="text-sm text-[#8b8fa3]">I'm your property intelligence agent. Ask me about energy usage, bills, recommendations, experiments, or anything about your property.</p>
        <p class="text-xs text-[#555a6e] mt-2">Powered by 14 MCP tools connected to your property data.</p>
      </div>
    </div>
  </div>

  <!-- Input area -->
  <form hx-post="/partials/chat/send"
        hx-target="#chat-messages"
        hx-swap="beforeend"
        hx-on::after-request="this.reset(); document.getElementById('chat-messages').scrollTop = document.getElementById('chat-messages').scrollHeight"
        class="flex gap-3">
    <input type="text" name="message" placeholder="Ask about your property..."
           autocomplete="off"
           class="flex-1 bg-[#1a1d27] border border-[#2e3346] rounded-xl px-4 py-3 text-sm text-[#e8eaed] placeholder-[#555a6e] focus:outline-none focus:border-[#4f9cf7] transition-colors">
    <button type="submit"
            class="px-6 py-3 bg-[#4f9cf7] text-white text-sm rounded-xl hover:bg-[#4f9cf7]/80 transition-colors flex-shrink-0">
      Send
    </button>
  </form>
</div>
{% endblock %}
